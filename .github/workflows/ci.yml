name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: audit
          POSTGRES_PASSWORD: audit
          POSTGRES_DB: audit
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U audit" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      # role DONO (migração/bootstrap) e role da APLICAÇÃO (testes, RLS valendo)
      DATABASE_URL: postgresql+psycopg://audit:audit@localhost:5432/audit
      APP_DATABASE_URL: postgresql+psycopg://app_rw:app_rw@localhost:5432/audit
      APP_DB_PASSWORD: app_rw
      DB_OWNER: audit
      APP_SECRET_KEY: ci-secret
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Types (mypy) — advisory
        run: mypy app
        continue-on-error: true
      - name: Migrate (role dono) + bootstrap role de aplicação (C-1)
        run: |
          alembic upgrade head
          python -m scripts.bootstrap_roles
      - name: Test (Postgres real — inclui isolamento multi-tenant)
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npx next build

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit pip-audit
      - name: Bandit (médio/alto)
        run: bandit -r app -ll
      - name: pip-audit — advisory
        run: pip-audit || true
      - name: Gitleaks (segredos)
        uses: gitleaks/gitleaks-action@v2
