<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<title>Cartões de indicador (KPI)</title><link rel="stylesheet" href="_base.css"></head>
<body>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:760px">
  <div class="card">
    <div class="muted" style="font-size:14px">R$ exposto (aberto)</div>
    <div style="font-size:24px;font-weight:600;margin-top:4px">R$ 2.952.644</div>
    <div class="faint" style="margin-top:4px">economia potencial (preço)</div>
  </div>
  <div class="card">
    <div class="muted" style="font-size:14px">Gasto a revisar</div>
    <div style="font-size:24px;font-weight:600;margin-top:4px">R$ 16.706.643</div>
    <div class="faint" style="margin-top:4px">governança (sem concorrência)</div>
  </div>
  <div class="card">
    <div class="muted" style="font-size:14px">Achados abertos</div>
    <div style="font-size:24px;font-weight:600;margin-top:4px">1.014</div>
    <div class="faint" style="margin-top:4px">priorizados por materialidade</div>
  </div>
</div>
</body></html>
