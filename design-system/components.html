<!-- @dsCard group="Componentes" -->
<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<title>Componentes — botões, badges, status, R$</title><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="max-width:760px">
  <div class="h" style="font-size:18px">Componentes</div>

  <div class="h" style="margin-top:18px">Botões</div>
  <div class="row" style="margin-top:8px;flex-wrap:wrap">
    <button class="btn btn-primary">Aceitar</button>
    <button class="btn btn-secondary">Testar conexão</button>
    <button class="btn btn-ghost">Escalar</button>
    <button class="btn btn-danger">Descartar</button>
  </div>

  <div class="h" style="margin-top:18px">Severidade (badge)</div>
  <div class="row" style="margin-top:8px;flex-wrap:wrap">
    <span class="badge b-crit">Crítica</span>
    <span class="badge b-high">Alta</span>
    <span class="badge b-med">Média</span>
    <span class="badge b-low">Baixa</span>
  </div>

  <div class="h" style="margin-top:18px">Status do achado</div>
  <div class="row" style="margin-top:8px;flex-wrap:wrap">
    <span class="status">Aberto</span>
    <span class="status">Aceito</span>
    <span class="status">Descartado</span>
    <span class="status">Escalado</span>
    <span class="status">Resolvido</span>
  </div>

  <div class="h" style="margin-top:18px">Valor em R$</div>
  <div class="row" style="margin-top:8px">
    <span class="money" style="font-size:20px">R$ 206.194,13</span>
    <span class="faint">exposto</span>
  </div>

  <div class="h" style="margin-top:18px">Campo de formulário</div>
  <div style="margin-top:8px;max-width:340px">
    <label class="label">Subdomínio</label>
    <input class="input" value="suaempresa" readonly>
  </div>
</div>
</body></html>
