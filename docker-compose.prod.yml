# Compose de PRODUÇÃO. Diferenças vs. o dev (docker-compose.yml):
#  - sem --reload e sem volume do código-fonte (imagem imutável);
#  - restart: unless-stopped; healthchecks; sem MinIO (use S3 gerenciado);
#  - Caddy faz reverse proxy + HTTPS automático; api/frontend NÃO expõem porta no host.
# Uso: docker compose -f docker-compose.prod.yml up -d --build
# Requer DNS: APP_DOMAIN e API_DOMAIN apontando p/ o IP do servidor.
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?defina APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN:?defina API_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - frontend

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-audit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-audit}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-audit}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    # migra (dono) + cria role app_rw + bootstrap planos + sobe API como app_rw (RLS, C-1)
    command: bash entrypoint.sh uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
    command: python -m app.workers.run
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?defina a URL pública da API}
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "3000"

volumes:
  pgdata:
  caddy-data:
  caddy-config:
